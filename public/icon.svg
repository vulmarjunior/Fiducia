<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-fluid-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background behind the shield with deep theme colors -->
  <rect width="100" height="100" rx="22" fill="#0f172a" />
  
  <!-- Glow backdrop -->
  <circle cx="50" cy="50" r="30" fill="#10b981" opacity="0.15" filter="url(#logo-glow)" />

  <!-- Shield backdrop -->
  <path
    d="M20,30 L50,15 L80,30 L80,55 C80,75 50,90 50,90 C50,90 20,75 20,55 Z"
    stroke="url(#logo-fluid-grad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#1e293b"
    fill-opacity="0.4"
    opacity="0.8"
  />
  <!-- Monogram F trend ribbon -->
  <path
    d="M33,38 H67 M33,53 H58 M33,38 V72"
    stroke="url(#logo-fluid-grad)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Upward growing dot representing growth trend -->
  <circle
    cx="67"
    cy="38"
    r="5.5"
    fill="#10b981"
  />
</svg>
